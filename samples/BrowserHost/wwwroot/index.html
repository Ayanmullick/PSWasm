<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PSWasm Browser Host</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 2rem; }
    pre { border: 1px solid CanvasText; padding: 1rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>PSWasm Browser Host</h1>
  <pre id="output">Starting...</pre>

  <script type="pwsh">
Write-Host 'PSWasm browser built-ins'
Get-Culture
Get-UICulture
Get-Date -Format 'yyyy-MM-dd HH:mm:ss'
Get-Time
Get-TimeZone
Get-Command Format-* | Select-Object -ExpandProperty Name
  </script>

  <script type="pwsh">
Write-Host 'PSWasm stream output'
Write-Debug 'Debug message'
Write-Information 'Information message'
Write-Progress -Activity 'Loading' -Status 'Halfway' -PercentComplete 50
Write-Verbose 'Verbose message'
Write-Warning 'Warning message'
Write-Error 'Error message'
  </script>

  <script type="pwsh">
#region expressions and collections
Write-Output (2 + 2)
($var = 1 + 2) -eq 3
Write-Output 'chain-left' && Write-Output 'chain-right'
Write-Error 'chain-error' || Write-Output 'chain-recovered'
$array = 22,5,10,8,12
$array.Count
$array[0]
$array[-1]
$array[1..2]
$table = @{Name='PSWasm'; Value=42}
$table['Name']
$table.Count
$table.Keys | Sort-Object
#endregion
  </script>

  <script type="pwsh">
# Invoke-WebRequest uses browser HTTP and requires the target service to allow CORS.
$response = Invoke-WebRequest -Uri 'https://api.github.com/zen' -Headers @{Accept='application/json'} -SkipHttpErrorCheck
$response | Select-Object StatusCode RawContentLength
$response.Content
  </script>

  <script type="pwsh">
Set-Variable -Name BrowserName -Value 'PSWasm'
Get-Variable BrowserName -ValueOnly
Get-Variable BrowserName | Format-List Name Value
  </script>

  <script type="pwsh">
$value = 3
if ($value -gt 5) {
    'large'
} elseif ($value -eq 3) {
    'matched'
} else {
    'small'
}
foreach ($item in 1..3) {
    $item * 2
}
$i = 0
while ($i -lt 3) {
    $i = $i + 1
    $i
}
for ($j = 0; $j -lt 3; $j = $j + 1) {
    $j
}
switch ('browser') {
    'server' { 'server path' }
    'brow*' { 'browser path' }
    default { 'fallback path' }
}
function Add-Prefix($Text) {
    "pre-$Text"
}
Add-Prefix -Text 'browser'
function First-Matches($Items) {
    foreach ($item in $Items) {
        if ($item -lt 2) {
            continue
        }
        if ($item -gt 3) {
            break
        }
        $item
    }
    return 'done'
}
First-Matches @(1,2,3,4)
  </script>

  <script type="pwsh">
try {
    throw 'Browser try/catch sample'
} catch {
    $_.Message
} finally {
    'finally ran'
}
  </script>

  <script type="pwsh">
1..4 | Where-Object { $_ -gt 2 } | ForEach-Object { $_ * 10 }
@(@{Name='one'; Value=1}, @{Name='two'; Value=2}, @{Name='three'; Value=3}) |
    Where-Object { $PSItem.Value -ge 2 } |
    Select-Object -ExpandProperty Name
  </script>

  <script type="pwsh">
@{Name='browser'; Value=42} | ConvertTo-Json -Compress
'{"Name":"json","Value":7}' | ConvertFrom-Json | Select-Object -ExpandProperty Name
'Name,Value
csv,8' | ConvertFrom-Csv | Select-Object -ExpandProperty Name
  </script>

  <script type="pwsh">
@(@{Name='table-one'; Value=1}, @{Name='table-two'; Value=2}) | Format-Table Name Value
@{Name='list-sample'; Value=9} | Format-List
@(@{Name='three'; Value=3}, @{Name='one'; Value=1}, @{Name='two'; Value=2}) |
    Sort-Object Value |
    Select-Object -ExpandProperty Name
@(@{Name='one'; Value=1}, @{Name='two'; Value=2}, @{Name='three'; Value=3}) |
    Measure-Object Value -Sum -Average -Minimum -Maximum |
    ConvertTo-Json -Compress
@('b','a','b') |
    Group-Object |
    Sort-Object Name |
    Select-Object Count Name |
    ConvertTo-Json -Compress
@{Name='one'; Value=1} | Out-String
  </script>

  <script>
    window.pswasmEnvironment = {};
  </script>
  <!-- Importing app.js automatically runs all <script type="pwsh"> blocks. -->
  <script type="module" src="./app.js"></script>
</body>
</html>
