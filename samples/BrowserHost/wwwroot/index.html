<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PSWasm Browser Host</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 2rem; }
    pre { border: 1px solid CanvasText; padding: 1rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>PSWasm Browser Host</h1>

  <script type="pwsh">
Write-Host 'PSWasm browser built-ins'
Get-Culture
Get-UICulture
Get-Date -Format 'yyyy-MM-dd HH:mm:ss'
Get-Time
Get-TimeZone
Get-Command Format-* | Select-Object -ExpandProperty Name
  </script>

  <hr>

  <script type="pwsh">
Write-Host 'PSWasm stream output'
$DebugPreference = 'Continue'
$InformationPreference = 'Continue'
$VerbosePreference = 'Continue'
Write-Debug 'Debug message'
Write-Information 'Information message'
Write-Progress -Activity 'Loading' -Status 'Halfway' -PercentComplete 50
Write-Verbose 'Verbose message'
Write-Warning 'Warning message'
Write-Error 'Error message'
  </script>

  <hr>

  <script type="pwsh">
#region expressions and collections
Write-Output (2 + 2)
($var = 1 + 2) -eq 3
Write-Output 'chain-left' && Write-Output 'chain-right'
Write-Error 'chain-error' || Write-Output 'chain-recovered'
$array = 22,5,10,8,12
$array.Count
$array[0]
$array[-1]
$array[1..2]
$table = @{Name='PSWasm'; Value=42}
$table['Name']
$table.Count
$table.Keys | Sort-Object
#endregion
  </script>

  <hr>

  <script type="pwsh">
# Invoke-WebRequest uses browser HTTP and requires the target service to allow CORS.
$response = Invoke-WebRequest -Uri 'https://api.github.com/zen' -Headers @{Accept='application/json'} -SkipHttpErrorCheck
$response | Select-Object StatusCode RawContentLength
$response.Content
  </script>

  <hr>

  <script type="pwsh">
Set-Variable -Name BrowserName -Value 'PSWasm'
Get-Variable BrowserName -ValueOnly
Get-Variable BrowserName | Format-List Name Value
  </script>

  <hr>

  <script type="pwsh">
Write-Host 'PSWasm automatic variables'
$?
$PSEdition
$PSVersionTable.Platform
$Host.Name
$PWD.Path
$HOME
$PSCulture
$PSUICulture
'abc123' -match '([a-z]+)(?<Digits>\d+)'
$Matches[0]
$Matches['Digits']
Write-Error 'automatic variable sample error'
$?
$Error[0].Message
function Show-Bound($Name, $Value) {
    $PSBoundParameters.Count
    $PSBoundParameters['Name']
    $PSBoundParameters['Value']
}
Show-Bound -Name 'browser' -Value 42
  </script>

  <hr>

  <script type="pwsh">
Write-Host 'PSWasm regular expressions'
'Server-01' -match 'Server-\d\d'
$Matches[0]
'CONTOSO\jsmith' -match '(?<Domain>\w+)\\(?<User>\w+)'
$Matches.Domain
$Matches.User
'Hello World' -replace @('(\w+) \w+', '$1 Browser')
'a1 b22 c333' -split '\s+'
switch -Regex ('browser-42') {
    'browser-(?<Id>\d+)' { 'browser-' + $Matches.Id }
    default { 'fallback' }
}
@('Alpha','beta','gamma42') | Select-String -Pattern '^[a-z]+$' | Select-Object -ExpandProperty Line
'one two one' |
    Select-String -Pattern 'one' -AllMatches |
    Select-Object -ExpandProperty Matches |
    Select-Object -ExpandProperty Value
  </script>

  <hr>

  <script type="pwsh">
Write-Host 'PSWasm splatting'
function Show-Splat($Name, $Value) {
    "$Name=$Value"
}
$named = @{Name='hash'; Value=1}
Show-Splat @named
Show-Splat @named -Value 2
$positional = 'array', 3
Show-Splat @positional
function Forward-Bound($Name, $Value) {
    Show-Splat @PSBoundParameters
}
Forward-Bound -Name 'bound' -Value 4
function Forward-Args {
    Show-Splat @args
}
Forward-Args 'args' 5
  </script>

  <hr>

  <script type="pwsh">
Write-Host 'PSWasm preference variables'
$DebugPreference
$InformationPreference
$WarningPreference = 'SilentlyContinue'
Write-Warning 'hidden warning'
'warning was hidden'
$WarningPreference = 'Continue'
Write-Warning 'visible warning'
$VerbosePreference = 'Continue'
Write-Verbose 'visible verbose'
$ErrorActionPreference = 'SilentlyContinue'
Write-Error 'hidden error'
$Error.Count
$values = 1,2,3
"$values"
$OFS = '|'
"$values"
  </script>

  <hr>

  <script type="pwsh">
Write-Host 'PSWasm common parameters'
Write-Verbose 'Visible with -Verbose' -Verbose
Write-Debug 'Visible with -Debug' -Debug
Write-Warning 'Hidden warning' -WarningAction SilentlyContinue
Write-Information 'Visible information' -InformationAction Continue
Write-Output 'Captured output' -OutVariable capturedOutput
$capturedOutput
Write-Warning 'Captured warning' -WarningVariable capturedWarning
$capturedWarning
Write-Error 'Captured error' -ErrorAction SilentlyContinue -ErrorVariable capturedError
$capturedError[0].Message
Write-Output 'Pipeline capture' -PipelineVariable pipelineValue
$pipelineValue
Write-Output 'OutBuffer accepted' -OutBuffer 10
  </script>

  <hr>

  <script type="pwsh">
$value = 3
if ($value -gt 5) {
    'large'
} elseif ($value -eq 3) {
    'matched'
} else {
    'small'
}
  </script>

  <hr>

  <script type="pwsh">
foreach ($item in 1..3) {
    $item * 2
}
  </script>

  <hr>

  <script type="pwsh">
$i = 0
while ($i -lt 3) {
    $i = $i + 1
    $i
}
  </script>

  <hr>

  <script type="pwsh">
for ($j = 0; $j -lt 3; $j++) {
    $j
}
  </script>

  <hr>

  <script type="pwsh">
switch ('browser') {
    'server' { 'server path' }
    'brow*' { 'browser path' }
    default { 'fallback path' }
}
  </script>

  <hr>

  <script type="pwsh">
function Add-Prefix($Text) {
    "pre-$Text"
}
Add-Prefix -Text 'browser'
  </script>

  <hr>

  <script type="pwsh">
function First-Matches($Items) {
    foreach ($item in $Items) {
        if ($item -lt 2) {
            continue
        }
        if ($item -gt 3) {
            break
        }
        $item
    }
    return 'done'
}
First-Matches @(1,2,3,4)
  </script>

  <hr>

  <script type="pwsh">
try {
    throw 'Browser try/catch sample'
} catch {
    $_.Message
} finally {
    'finally ran'
}
  </script>

  <hr>

  <script type="pwsh">
1..4 | Where-Object { $_ -gt 2 } | ForEach-Object { $_ * 10 }
@(@{Name='one'; Value=1}, @{Name='two'; Value=2}, @{Name='three'; Value=3}) |
    Where-Object { $PSItem.Value -ge 2 } |
    Select-Object -ExpandProperty Name
  </script>

  <hr>

  <script type="pwsh">
@{Name='browser'; Value=42} | ConvertTo-Json -Compress
'{"Name":"json","Value":7}' | ConvertFrom-Json | Select-Object -ExpandProperty Name
'Name,Value
csv,8' | ConvertFrom-Csv | Select-Object -ExpandProperty Name
  </script>

  <hr>

  <script type="pwsh">
@(@{Name='table-one'; Value=1}, @{Name='table-two'; Value=2}) | Format-Table Name Value
@{Name='list-sample'; Value=9} | Format-List
@(@{Name='three'; Value=3}, @{Name='one'; Value=1}, @{Name='two'; Value=2}) |
    Sort-Object Value |
    Select-Object -ExpandProperty Name
@(@{Name='one'; Value=1}, @{Name='two'; Value=2}, @{Name='three'; Value=3}) |
    Measure-Object Value -Sum -Average -Minimum -Maximum |
    ConvertTo-Json -Compress
@('b','a','b') |
    Group-Object |
    Sort-Object Name |
    Select-Object Count Name |
    ConvertTo-Json -Compress
@{Name='one'; Value=1} | Out-String
  </script>

  <hr>

  <script type="pwsh">
Write-Host 'PSWasm DOM session commands'
$Dom = New-DomSession -Name Main -Target '#app'
$Dom | Select-Object Id Name Target State
Get-DomSession Main | Select-Object -ExpandProperty SessionType
  </script>

  <hr>

  <script type="pwsh">
Write-Host 'PSWasm shared PowerShell session'
$SharedValue = 'from an earlier script block'
function Use-SharedValue {
    $SharedValue
}
  </script>

  <hr>

  <script type="pwsh" src="./sample.ps1"></script>

  <hr>

  <script type="pwsh">
Use-SharedValue
Remove-DomSession Main
$remaining = Get-DomSession
$remaining ?? 'DOM session removed'
  </script>

  <script>
    window.pswasmEnvironment = {};
  </script>
  <!-- Importing app.js automatically runs all <script type="pwsh"> blocks. -->
  <script type="module" src="./app.js"></script>
</body>
</html>
