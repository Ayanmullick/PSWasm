name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'samples/BrowserHost/**'
      - 'tests/PowerShell.Wasm.Verify/**'
      - 'global.json'
      - '*.sln'
      - '*.props'
      - '*.targets'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install WebAssembly workload
        run: dotnet workload install wasm-tools

      - name: Build runtime
        run: dotnet build src/PowerShell.Wasm/PowerShell.Wasm.csproj --configuration Release

      - name: Verify runtime behavior
        run: dotnet run --project tests/PowerShell.Wasm.Verify/PowerShell.Wasm.Verify.csproj --configuration Release

      - name: Check browser module syntax
        run: node --check samples/BrowserHost/wwwroot/app.js

      - name: Publish browser host
        run: dotnet publish samples/BrowserHost/PSWasm.BrowserHost.csproj --configuration Release --runtime browser-wasm --output publish /p:UseAppHost=false

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
